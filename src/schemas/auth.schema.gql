type Query {
  me: User
}

type Mutation {
  signup(args: SignupInput!): User!
  signin(args: SigninInput!): User!
  signout: DeleteResponse!
  askResetPassword(email: String!): GenericResponse!
  resetPassword(args: ResetPasswordInput!): User!
}

input ResetPasswordInput {
  email: String! @constraint(format: "email", maxLength: 255)
  token: String!
  newPassword: String!
    @constraint(
      pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,}$"
      maxLength: 30
      minLength: 8
    )
  confirmNewPassword: String!
}

input SignupInput {
  email: String! @constraint(format: "email", maxLength: 255)
  firstname: String @constraint(pattern: "^[a-zA-Zà-öø-ÿÀ-ÖØ-ß' -]{2,50}$", maxLength: 50, minLength: 2)
  lastname: String @constraint(pattern: "^[a-zA-Zà-öø-ÿÀ-ÖØ-ß' -]{2,50}$", maxLength: 50, minLength: 2)
  isPremium: Boolean!
  password: String!
    @constraint(
      pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,}$"
      maxLength: 30
      minLength: 8
    )
  confirmPassword: String!
}

input SigninInput {
  email: String! @constraint(format: "email", maxLength: 255)
  password: String!
}
