scalar UUID
enum QuestionType {
  OPEN
  SIMPLE
  MULTIPLE
}

type Question {
  id: UUID!
  label: String!
  type: QuestionType!
  isMandatory: Boolean!
  position: Int!
  dependsOn: UUID
  options: [Option!]!
  survey: Survey!
  answers(data: AnswersFilterInput!): AnswerConnection!
  createdAt: Date!
  updatedAt: Date!
}

type QuestionEdge {
  cursor: String!
  node: Question!
}

type QuestionConnection {
  totalCount: Int!
  edges: [QuestionEdge!]!
  pageInfo: PageInfo!
}

type Query {
  question(id: UUID!): Question
  questions(args: QuestionFilterInput!): QuestionConnection!
}

type Mutation {
  createQuestion(args: CreateQuestionInput!): Question!
  updateQuestion(args: UpdateQuestionInput!): Question!
  deleteQuestion(args: DeleteQuestionInput!): DeleteResponse!
}


input CreateQuestionInput {
  label: String! @constraint(maxLength: 255, minLength: 3)
  position: Int!
  isMandatory: Boolean
  dependsOn: UUID 
  surveyId: UUID! 
  type: QuestionType!
  options: [CreateOptionWithQuestionInput!]
}

input QuestionTypeFilter {
  equals: QuestionType
}

input UpdateQuestionInput {
  id: UUID! 
  label: String @constraint(maxLength: 255, minLength: 3)
  isMandatory: Boolean
  dependsOn: UUID 
  type: QuestionType
  options: [CreateOptionInput!]
}

input DeleteQuestionInput {
  id: UUID!
}

input QuestionFilter {
  id: UUID
  label: StringFilterInput
  isMandatory: BooleanFilterInput
  dependsOn: StringFilterInput
  type: QuestionTypeFilter
}

input QuestionFilterInput {
  filters: QuestionFilter
  pagination: PaginationInput
}