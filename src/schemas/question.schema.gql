enum QuestionType {
  OPEN
  SIMPLE
  MULTIPLE
}

type Question {
  id: UUID!
  label: String!
  type: QuestionType!
  isMandatory: Boolean!
  position: Int!
  dependsOn: UUID
  survey: Survey!
  createdAt: Date!
  updatedAt: Date!
}

type QuestionEdge {
  cursor: String!
  node: Question!
}

type QuestionConnection {
  totalCount: Int!
  edges: [QuestionEdge!]!
  pageInfo: PageInfo!
}

type Query {
  question(id: UUID!): Question
  questions(args: QuestionFilterInput!): QuestionConnection!
}

type Mutation {
  createQuestion(args: CreateQuestionInput!): Question!
  updateQuestion(args: UpdateQuestionInput!): Question!
  deleteQuestion(args: DeleteQuestionInput!): DeleteResponse!
}


